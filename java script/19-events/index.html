<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<h1 id="title">
Student Dashboard
</h1>

<div id="card">

<h2>Student Information</h2>

<form id="studentForm">

<input
id="name"
type="text"
placeholder="Enter your name">

<p>
Preview :
<span id="preview"></span>
</p>

<p>
Characters :
<span id="count">0</span>
</p>

<select id="department">

<option>CSE</option>

<option>EEE</option>

<option>BBA</option>

</select>

<br><br>

<button type="submit">

Register

</button>

<button
type="button"
id="reset">

Reset

</button>

</form>

</div>

<br>

<h3>

Keyboard :

<span id="keyboard">

None

</span>

</h3>

<h3>

Mouse :

<span id="mouse">

0 , 0

</span>

</h3>

<script src="script.js"></script>

</body>

</html>
