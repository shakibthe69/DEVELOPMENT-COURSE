<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>04 - Colors & Background</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>CSS Colors & Background</h1>

    <section class="colors">

        <div class="box red">Color Name</div>

        <div class="box hex">HEX Color</div>

        <div class="box rgb">RGB Color</div>

        <div class="box rgba">RGBA Color</div>

        <div class="box hsl">HSL Color</div>

    </section>

    <section class="hero">

        <h2>Welcome to My Website</h2>

        <p>
            This section uses a background image.
        </p>

        <button>Explore</button>

    </section>

    <section class="gradient">

        <h2>Linear Gradient</h2>

    </section>

    <section class="radial">

        <h2>Radial Gradient</h2>

    </section>

</body>

</html>
