<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CSS Animations</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<h1>

CSS Animation Playground

</h1>

<section>

<h2>1. Hover Button</h2>

<button class="btn">

Hover Me

</button>

</section>

<section>

<h2>2. Rotating Box</h2>

<div class="rotate box"></div>

</section>

<section>

<h2>3. Bouncing Ball</h2>

<div class="ball"></div>

</section>

<section>

<h2>4. Loading Spinner</h2>

<div class="spinner"></div>

</section>

<section>

<h2>5. Fade In</h2>

<div class="fade card">

Fade Animation

</div>

</section>

<section>

<h2>6. Slide In</h2>

<div class="slide card">

Slide Animation

</div>

</section>

<section>

<h2>7. Pulse Effect</h2>

<div class="pulse"></div>

</section>

<section>

<h2>8. Typing Effect</h2>

<p class="typing">

Learning CSS Animation...

</p>

</section>

</body>

</html>
