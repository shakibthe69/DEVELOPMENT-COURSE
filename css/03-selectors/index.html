<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>03 - CSS Selectors</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>CSS Selectors</h1>

    <p>
        This paragraph uses an element selector.
    </p>

    <p class="blue-text">
        This paragraph uses a class selector.
    </p>

    <p id="special">
        This paragraph uses an ID selector.
    </p>

    <div class="card">

        <h2>Card Title</h2>

        <p>
            Paragraph inside card.
        </p>

        <button>
            Read More
        </button>

    </div>

    <input
        type="text"
        placeholder="Your Name">

    <input
        type="email"
        placeholder="Your Email">

    <input
         type=""password"
         placeholder="enter passwoed"

    <ul>

        <li>Apple</li>

        <li>Orange</li>

        <li>Mango</li>

    </ul>

    <ol>
        <li>shakib</li>
        <li>sifat</li>
        <li>rony</li>
    </ol>

</body>

</html>
